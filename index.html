<!DOCTYPE html>
<html>
<head>
    <title>Fake JSON API Users</title>

    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #000;
            padding: 8px;
            text-align: center;
        }

        th{
            background-color: #f2f2f2;
        }

        img{
            width:120px;
            height:120px;
        }
    </style>
</head>

<body>

<h2>Users from Fake JSON API</h2>

<table id="userTable">
    <thead>
        <tr>
            <th>Picture</th>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Company</th>
            <th>Address</th>
            <th>Country</th>
            <th>Zip</th>
        </tr>
    </thead>

    <tbody></tbody>
</table>

<script>

$(document).ready(function(){

    $.getJSON("https://fake-json-api.mock.beeceptor.com/users", function(data){

        $.each(data, function(i, user){

            $("#userTable tbody").append(
                "<tr>" +
                "<td><img src='"+user.photo+"' width='120' height='120'></td>" +
                "<td>"+user.id+"</td>" +
                "<td>"+user.name+"</td>" +
                "<td>"+user.email+"</td>" +
                "<td>"+user.company+"</td>" +
                "<td>"+user.address+"</td>" +
                "<td>"+user.country+"</td>" +
                "<td>"+user.zip+"</td>" +
                "</tr>"
            );

        });

        $("#userTable tbody").append(
            "<tr>" +
            "<td><img src='https://www.pinterest.com/jswmetalworks/men-in-black-and-white-photos/'></td>" +
            "<td>11</td>" +
            "<td>Vincent Ampong</td>" +
            "<td>vincentampong.nmsc.edu.ph</td>" +
            "<td>JHCSC-CMSECT</td>" +
            "<td>Lakewood, Zamboanga del Sur</td>" +
            "<td>Philippines</td>" +
            "<td>7014</td>" +
            "</tr>"
        );

    });

});

</script>

</body>
</html>
